<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Subject — Vidya Mandir</title>
<link rel="stylesheet" href="css/style.css">
<style>
.subj-hero{background:linear-gradient(135deg,rgba(var(--br),.16) 0%,rgba(var(--br),.04) 100%);border:1px solid var(--bdr2);border-radius:var(--rl);padding:24px 26px;margin-bottom:22px;position:relative;overflow:hidden}
.subj-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sh-g,linear-gradient(90deg,var(--b),var(--a)))}
.topic-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tf-btn{padding:5px 14px;border-radius:99px;font-size:.78rem;font-weight:700;border:1px solid var(--bdr);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s}
.tf-btn:hover{border-color:var(--bdr2);color:var(--t1)}
.tf-btn.on{background:rgba(var(--br),.14);color:var(--bl);border-color:rgba(var(--br),.3)}
</style>
</head>
<body>
<div id="nb"></div>
<div class="page-layout">
  <div id="sb"></div>
  <main class="main-area" id="mainArea">
    <div style="display:flex;align-items:center;justify-content:center;height:200px"><div class="spinner"></div></div>
  </main>
</div>
<div class="page-watermark"></div>
<script src="js/app.js"></script>
<script src="js/security.js"></script>
<script src="js/theme_todo.js"></script>
<script>
let _activeFilter='all';

document.addEventListener('DOMContentLoaded',async()=>{
  const sid=App.getParam('id');
  if(!sid){location.href='dashboard.html';return;}
  await App.loadData();
  const subj=App.getSubject(sid);
  if(!subj){location.href='dashboard.html';return;}
  document.title=`${subj.name} — Vidya Mandir`;
  App.initPage(sid);

  const p=App.getProgress();
  const sp=p[sid]||{};
  const done=sp.done||[];
  const pct=App.getSubjPct(sid,subj);
  const admData=App._parseLS('vm_admin_data',{pdfs:[],ncertTopics:[],teachers:[]});
  const admPDFs=(admData.pdfs||[]).filter(pdf=>pdf.subject===sid&&!pdf.chapter);
  const admTopics=(admData.ncertTopics||[]).filter(t=>t.subject===sid&&!t.chapter);

  document.getElementById('mainArea').innerHTML=`
    <div class="page-head au">
      <div class="breadcrumb"><a href="dashboard.html">Dashboard</a><span class="sep">›</span><span>${VidyaSec.sanitize(subj.name)}</span></div>
    </div>

    <div class="subj-hero au" style="--sh-g:${subj.gradient}">
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div style="font-size:52px;filter:drop-shadow(0 4px 12px rgba(var(--br),.4))">${subj.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-family:var(--fd);font-size:1.8rem;font-weight:700;line-height:1.1">${VidyaSec.sanitize(subj.name)}</div>
          <div style="font-family:var(--fd);font-style:italic;font-size:.95rem;color:var(--b);opacity:.8;margin-bottom:6px">${VidyaSec.sanitize(subj.nameHi)}</div>
          <div style="font-size:.85rem;color:var(--t2);margin-bottom:12px">${VidyaSec.sanitize(subj.description)}</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:.73rem;color:var(--t3);margin-bottom:12px">
            <span>📄 ${subj.chapters.length} chapters</span>
            <span>✅ ${done.length} done</span>
            <span>📊 ${pct}%</span>
          </div>
          <div class="pbar pbar-lg" style="max-width:320px"><div class="pfill" style="width:${pct}%"></div></div>
        </div>
      </div>
    </div>

    ${admPDFs.length?`
    <div style="margin-bottom:18px" class="au-1">
      <div style="font-family:var(--fd);font-size:.98rem;color:var(--bl);margin-bottom:10px">📁 Resources</div>
      <div class="gcard"><div class="card-top-rule"></div><div class="card-pad">
        ${admPDFs.map(pdf=>`<div class="pdf-row" onclick="window.open('${pdf.url}','_blank')">
          <span style="font-size:20px">📄</span>
          <span style="flex:1;font-size:.84rem;font-weight:600">${VidyaSec.sanitize(pdf.name)}</span>
          <span class="chip chip-tl">${VidyaSec.sanitize(pdf.type||'Notes')}</span>
        </div>`).join('')}
      </div></div>
    </div>`:''}

    ${admTopics.length?`
    <div style="margin-bottom:18px" class="au-1">
      <div style="font-family:var(--fd);font-size:.98rem;color:var(--bl);margin-bottom:10px">⭐ Important Topics</div>
      <div class="topics-card"><div class="card-top-rule"></div>
        ${admTopics.map((t,i)=>`<div class="topic-row">
          <div class="topic-n">${i+1}</div>
          <div class="topic-text">${VidyaSec.sanitize(t.text)}${t.important?' <span style="color:var(--b)">★</span>':''}</div>
          ${t.marks?`<div class="topic-marks">${VidyaSec.sanitize(t.marks)}M</div>`:''}
        </div>`).join('')}
      </div>
    </div>`:''}

    <div class="au-2">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:8px">
        <div style="font-family:var(--fd);font-size:1.1rem;color:var(--bl)">अध्याय &middot; Chapters</div>
        <span style="font-size:.74rem;color:var(--t3)">${subj.chapters.length} in syllabus</span>
      </div>
      <div class="topic-filter">
        <button class="tf-btn on" data-f="all" onclick="filterCh('all',this)">All</button>
        <button class="tf-btn" data-f="pending" onclick="filterCh('pending',this)">Pending</button>
        <button class="tf-btn" data-f="done" onclick="filterCh('done',this)">Completed</button>
      </div>
      <div class="ch-list" id="chList"></div>
    </div>`;

  renderCh(subj, sid, done, sp, admData);
});

function filterCh(f, btn) {
  _activeFilter=f;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.toggle('on',b.dataset.f===f));
  const sid=App.getParam('id');
  const subj=App.getSubject(sid);
  const sp=App.getProgress()[sid]||{};
  renderCh(subj, sid, sp.done||[], sp, App._parseLS('vm_admin_data',{pdfs:[],ncertTopics:[]}));
}

function renderCh(subj, sid, done, sp, admData) {
  let chs=subj.chapters;
  if(_activeFilter==='done')    chs=chs.filter(c=>done.includes(c.id));
  if(_activeFilter==='pending') chs=chs.filter(c=>!done.includes(c.id));

  const el=document.getElementById('chList');
  if(!el) return;
  if(!chs.length){el.innerHTML=`<div style="text-align:center;padding:28px;color:var(--t3);font-size:.86rem">No chapters match this filter</div>`;return;}

  el.innerHTML=chs.map((ch,i)=>{
    const isDone=done.includes(ch.id);
    const score=sp.scores?.[ch.id];
    const origIdx=subj.chapters.indexOf(ch);
    const chPDFs=(admData.pdfs||[]).filter(p=>p.chapter===ch.id).length;
    const admTop=(admData.ncertTopics||[]).filter(t=>t.chapter===ch.id).length;
    const bm=App.isBookmarked(sid,ch.id);
    return `<a href="chapter.html?subject=${sid}&chapter=${ch.id}" class="ch-row ${isDone?'done':''}" style="animation:fadeUp .35s ${i*40}ms both">
      <div class="ch-num">${isDone?'✓':String(origIdx+1).padStart(2,'0')}</div>
      <div class="ch-info">
        <div class="ch-title">${VidyaSec.sanitize(ch.title)}</div>
        <div class="ch-metas">
          <span>▶ ${ch.lessons.length} lesson${ch.lessons.length!==1?'s':''}</span>
          <span>⏱ ${ch.duration}</span>
          <span>❓ ${ch.quiz.length} Qs</span>
          <span>⭐ ${(ch.ncertTopics?.length||0)+admTop}</span>
          ${chPDFs?`<span style="color:var(--tll)">📁 ${chPDFs}</span>`:''}
          ${bm?`<span style="color:var(--b)">🔖</span>`:''}
          ${score?`<span class="score-badge">🏆 ${score.pct}%</span>`:''}
          ${isDone?`<span style="color:var(--tll)">✅</span>`:''}
        </div>
      </div>
      <div class="ch-arr">›</div>
    </a>`;
  }).join('');
}
</script>
<script src="js/music.js"></script>
</body>
</html>
